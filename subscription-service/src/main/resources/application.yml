server.port: 8080

spring:
  application.name: subscription-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/simplestore}
    username: ${SPRING_DATASOURCE_USERNAME:simplestore}
    password: ${SPRING_DATASOURCE_PASSWORD:simplestore}
  jpa:
    hibernate.ddl-auto: update
    show-sql: false
    properties.hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
  cloud.stream:
    function.definition: subscriptionCycleStartedConsumer;paymentSuccessConsumer;paymentFailureConsumer
    bindings:
      subscriptionCycleStartedConsumer-in-0:
        destination: subscription-cycle-started
        group: subscription-service
      paymentSuccessConsumer-in-0:
        destination: subscription-payment-success
        group: subscription-service
      paymentFailureConsumer-in-0:
        destination: subscription-payment-failure
        group: subscription-service
    rabbit.bindings:
      subscriptionCycleStartedConsumer-in-0.consumer:
        exchangeType: fanout
      paymentSuccessConsumer-in-0.consumer:
        exchangeType: fanout
      paymentFailureConsumer-in-0.consumer:
        exchangeType: fanout
  security.oauth2.resourceserver.jwt:
    issuer-uri: http://identity-service:8080
    jwk-set-uri: http://identity-service:8080/.well-known/jwks.json

jwt.secret: ${JWT_SECRET:c2ltcGxlLXN0b3JlLXNlY3JldC1rZXktZm9yLWp3dC10b2tlbnMtc2hhcmVkLWFjcm9zcy1zZXJ2aWNlcw==}

springdoc:
  api-docs:
    path: /api/v1/subscription/api-docs
  swagger-ui:
    path: /api/v1/subscription/swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

logstash.host: ${LOGSTASH_HOST:localhost}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  health:
    rabbit:
      enabled: true
    db:
      enabled: true
    redis:
      enabled: true
