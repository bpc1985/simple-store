server.port: 8080
spring:
  application.name: gateway
  cloud.gateway:
    routes:
      - id: identity-service
        uri: http://identity-service:8080
        predicates:
          - Path=/api/v1/identity/**
      - id: catalog-service
        uri: http://catalog-service:8080
        predicates:
          - Path=/api/v1/catalog/**
      - id: cart-service
        uri: http://cart-service:8080
        predicates:
          - Path=/api/v1/cart/**
      - id: order-service
        uri: http://order-service:8080
        predicates:
          - Path=/api/v1/order/**
      - id: inventory-service
        uri: http://inventory-service:8080
        predicates:
          - Path=/api/v1/inventory/**
      - id: payment-service
        uri: http://payment-service:8080
        predicates:
          - Path=/api/v1/payment/**
    default-filters:
      - DedupeResponseHeader=Access-Control-Allow-Credential Access-Control-Allow-Origin
    globalcors:
      cors-configurations:
        '[/**]':
          allowedOrigins: "*"
          allowedMethods: "*"
          allowedHeaders: "*"
  security.oauth2.resourceserver.jwt:
    issuer-uri: http://identity-service:8080
    jwk-set-uri: http://identity-service:8080/.well-known/jwks.json
jwt.secret: ${JWT_SECRET:c2ltcGxlLXN0b3JlLXNlY3JldC1rZXktZm9yLWp3dC10b2tlbnMtc2hhcmVkLWFjcm9zcy1zZXJ2aWNlcw==}


logstash.host: ${LOGSTASH_HOST:localhost}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  health:
    rabbit:
      enabled: true
    db:
      enabled: true
    redis:
      enabled: true