server.port: 8080
spring:
  application.name: gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud.gateway:
    routes:
      - id: identity-register
        uri: http://identity-service:8080
        predicates:
          - Path=/api/v1/identity/register
        filters:
          - name: RequestRateLimiter
            args:
              redis-rate-limiter.replenishRate: 3
              redis-rate-limiter.burstCapacity: 5
              redis-rate-limiter.requestedTokens: 1
              key-resolver: "#{@ipKeyResolver}"
      - id: identity-login
        uri: http://identity-service:8080
        predicates:
          - Path=/api/v1/identity/login
        filters:
          - name: RequestRateLimiter
            args:
              redis-rate-limiter.replenishRate: 5
              redis-rate-limiter.burstCapacity: 10
              redis-rate-limiter.requestedTokens: 1
              key-resolver: "#{@ipKeyResolver}"
      - id: identity-refresh
        uri: http://identity-service:8080
        predicates:
          - Path=/api/v1/identity/refresh
        filters:
          - name: RequestRateLimiter
            args:
              redis-rate-limiter.replenishRate: 5
              redis-rate-limiter.burstCapacity: 10
              redis-rate-limiter.requestedTokens: 1
              key-resolver: "#{@ipKeyResolver}"
      - id: identity-service
        uri: http://identity-service:8080
        predicates:
          - Path=/api/v1/identity/**
      - id: catalog-service
        uri: http://catalog-service:8080
        predicates:
          - Path=/api/v1/catalog/**
      - id: cart-service
        uri: http://cart-service:8080
        predicates:
          - Path=/api/v1/cart/**
      - id: order-service
        uri: http://order-service:8080
        predicates:
          - Path=/api/v1/order/**
      - id: inventory-service
        uri: http://inventory-service:8080
        predicates:
          - Path=/api/v1/inventory/**
      - id: payment-service
        uri: http://payment-service:8080
        predicates:
          - Path=/api/v1/payment/**
      - id: subscription-service
        uri: http://subscription-service:8080
        predicates:
          - Path=/api/v1/subscription/**
    default-filters:
      - DedupeResponseHeader=Access-Control-Allow-Credential Access-Control-Allow-Origin
  security.oauth2.resourceserver.jwt.secret: ${JWT_SECRET:c2ltcGxlLXN0b3JlLXNlY3JldC1rZXktZm9yLWp3dC10b2tlbnMtc2hhcmVkLWFjcm9zcy1zZXJ2aWNlcw==}
jwt.secret: ${JWT_SECRET:c2ltcGxlLXN0b3JlLXNlY3JldC1rZXktZm9yLWp3dC10b2tlbnMtc2hhcmVkLWFjcm9zcy1zZXJ2aWNlcw==}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: identity
        url: /api/v1/identity/api-docs
      - name: catalog
        url: /api/v1/catalog/api-docs
      - name: cart
        url: /api/v1/cart/api-docs
      - name: order
        url: /api/v1/order/api-docs
      - name: inventory
        url: /api/v1/inventory/api-docs
      - name: payment
        url: /api/v1/payment/api-docs
      - name: subscription
        url: /api/v1/subscription/api-docs


logstash.host: ${LOGSTASH_HOST:localhost}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  health:
    rabbit:
      enabled: true
    db:
      enabled: true
    redis:
      enabled: true