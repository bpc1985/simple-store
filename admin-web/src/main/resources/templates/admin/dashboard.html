<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: html(content=~{::content}, title='Dashboard')}">
<th:block th:fragment="content">
    <h1>Dashboard</h1>
    <div class="stats-grid" th:if="${stats}">
        <div class="stat-card">
            <div class="stat-value" th:text="${stats.totalOrders}">0</div>
            <div class="stat-label">Total Orders</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" th:text="${#numbers.formatDecimal(stats.totalRevenue, 0, 'COMMA', 2, 'POINT')}">$0.00</div>
            <div class="stat-label">Total Revenue</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" th:text="${stats.pendingOrders}">0</div>
            <div class="stat-label">Pending Orders</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" th:text="${stats.confirmedOrders}">0</div>
            <div class="stat-label">Confirmed Orders</div>
        </div>
    </div>
    <div class="quick-links">
        <a href="/admin/products" class="btn">Manage Products</a>
        <a href="/admin/orders" class="btn">View Orders</a>
        <a href="/admin/users" class="btn">Manage Users</a>
    </div>
</th:block>
</html>
