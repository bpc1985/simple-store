<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: html(content=~{::content}, title='Products')}">
<th:block th:fragment="content">
    <div class="page-header">
        <h1>Products</h1>
        <a href="/admin/products/create" class="btn btn-primary">+ Add Product</a>
    </div>
    <div th:if="${message}" class="alert" th:classappend="${messageType == 'success' ? 'alert-success' : 'alert-error'}" th:text="${message}"></div>
    <table class="data-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Image</th>
                <th>Name</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Category</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="product : ${products}">
                <td th:text="${product.id}">1</td>
                <td><img th:src="${product.imageUrl}" alt="" style="width:50px;height:50px;object-fit:cover;" onerror="this.style.display='none'"></td>
                <td th:text="${product.name}">Product Name</td>
                <td th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 2, 'POINT')}">$0.00</td>
                <td th:text="${product.stock}">0</td>
                <td th:text="${product.categoryName}">Category</td>
                <td class="actions">
                    <a th:href="@{/admin/products/{id}/edit(id=${product.id})}" class="btn btn-sm">Edit</a>
                    <form th:action="@{/admin/products/{id}/delete(id=${product.id})}" method="post" style="display:inline" onsubmit="return confirm('Delete this product?')">
                        <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</th:block>
</html>
