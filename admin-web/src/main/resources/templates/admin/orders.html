<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: html(content=~{::content}, title='Orders')}">
<th:block th:fragment="content">
    <h1>Orders</h1>
    <table class="data-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>User</th>
                <th>Date</th>
                <th>Total</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="order : ${orders}">
                <td th:text="${order.id}">1</td>
                <td th:text="${order.userId}">user</td>
                <td th:text="${order.orderDate}">2024-01-01</td>
                <td th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 2, 'POINT')}">$0.00</td>
                <td>
                    <span class="status-badge" th:classappend="'status-' + ${order.status}" th:text="${order.status}">PENDING</span>
                </td>
                <td class="actions">
                    <a th:href="@{/admin/orders/{id}(id=${order.id})}" class="btn btn-sm">View</a>
                </td>
            </tr>
        </tbody>
    </table>
</th:block>
</html>
