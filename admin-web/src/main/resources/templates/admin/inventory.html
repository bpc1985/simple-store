<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: html(content=~{::content}, title='Inventory')}">
<th:block th:fragment="content">
    <h1>Inventory Management</h1>
    <div th:if="${message}" class="alert" th:classappend="${messageType == 'success' ? 'alert-success' : 'alert-error'}" th:text="${message}"></div>
    <table class="data-table">
        <thead>
            <tr>
                <th>Product ID</th>
                <th>Current Stock</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="entry : ${stockLevels}">
                <td th:text="${entry.productId}">1</td>
                <td>
                    <span th:if="${entry.stockLevel <= 10}" style="color:red;font-weight:bold" th:text="${entry.stockLevel}">5</span>
                    <span th:unless="${entry.stockLevel <= 10}" th:text="${entry.stockLevel}">50</span>
                </td>
                <td class="actions">
                    <form th:action="@{/admin/inventory/{id}(id=${entry.productId})}" method="post" class="form-inline">
                        <input type="number" name="stockLevel" th:value="${entry.stockLevel}" min="0" style="width:80px">
                        <button type="submit" class="btn btn-sm btn-primary">Update</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</th:block>
</html>
