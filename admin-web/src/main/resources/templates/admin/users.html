<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: html(content=~{::content}, title='Users')}">
<th:block th:fragment="content">
    <h1>Users</h1>
    <div th:if="${message}" class="alert" th:classappend="${messageType == 'success' ? 'alert-success' : 'alert-error'}" th:text="${message}"></div>
    <table class="data-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Email</th>
                <th>Full Name</th>
                <th>Roles</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.id}">1</td>
                <td th:text="${user.email}">user@email.com</td>
                <td th:text="${user.fullName}">Name</td>
                <td th:text="${#strings.arrayJoin(user.roles, ', ')}">USER</td>
                <td>
                    <span th:if="${user.locked}" class="status-badge status-CANCELLED">Locked</span>
                    <span th:unless="${user.locked}" class="status-badge status-CONFIRMED">Active</span>
                </td>
                <td class="actions">
                    <form th:if="${!user.locked}" th:action="@{/admin/users/{id}/lock(id=${user.id})}" method="post" style="display:inline">
                        <button type="submit" class="btn btn-sm btn-warning">Lock</button>
                    </form>
                    <form th:if="${user.locked}" th:action="@{/admin/users/{id}/unlock(id=${user.id})}" method="post" style="display:inline">
                        <button type="submit" class="btn btn-sm btn-success">Unlock</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</th:block>
</html>
