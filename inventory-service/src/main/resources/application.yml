server.port: 8080
spring:
  application.name: inventory-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/simplestore}
    username: ${SPRING_DATASOURCE_USERNAME:simplestore}
    password: ${SPRING_DATASOURCE_PASSWORD:simplestore}
  jpa:
    hibernate.ddl-auto: update
    show-sql: false
    properties.hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
  cloud.stream:
    function:
      definition: reserveStockConsumer;cancelReservationConsumer;boxAssemblyConsumer
    bindings:
      reserveStockConsumer-in-0:
        destination: reserve-stock-requested
        group: inventory-service
      cancelReservationConsumer-in-0:
        destination: stock-reservation-cancel-requested
        group: inventory-service
      boxAssemblyConsumer-in-0:
        destination: box-assembly-requested
        group: inventory-service
    rabbit.bindings:
      reserveStockConsumer-in-0.consumer:
        exchangeType: fanout
      cancelReservationConsumer-in-0.consumer:
        exchangeType: fanout
      boxAssemblyConsumer-in-0.consumer:
        exchangeType: fanout
  security.oauth2.resourceserver.jwt:
    issuer-uri: http://identity-service:8080
    jwk-set-uri: http://identity-service:8080/.well-known/jwks.json
jwt.secret: ${JWT_SECRET:c2ltcGxlLXN0b3JlLXNlY3JldC1rZXktZm9yLWp3dC10b2tlbnMtc2hhcmVkLWFjcm9zcy1zZXJ2aWNlcw==}

springdoc:
  api-docs:
    path: /api/v1/inventory/api-docs
  swagger-ui:
    path: /api/v1/inventory/swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha


logstash.host: ${LOGSTASH_HOST:localhost}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  health:
    rabbit:
      enabled: true
    db:
      enabled: true
    redis:
      enabled: true


  # Flyway — versioned migrations. baseline-on-migrate handles existing tables.
  # ponytail: ddl-auto stays 'update' because DB is empty. Switch to 'validate' after first boot creates tables.
  flyway:
    enabled: true
    locations: classpath:db/migration/inventory-service
    baseline-on-migrate: true
    baseline-version: 1
