      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: simplestore
      SPRING_RABBITMQ_PASSWORD: simplestore
      ELASTIC_APM_SERVICE_NAME: checkout-service
