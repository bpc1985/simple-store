version: '3.9'

services:
  # ============================================
  # Infrastructure
  # ============================================
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: simplestore
      POSTGRES_PASSWORD: simplestore
      POSTGRES_DB: simplestore
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simplestore"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: simplestore
      RABBITMQ_DEFAULT_PASS: simplestore
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ============================================
  # Observability — ELK Stack
  # ============================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\|yellow'"]
      interval: 10s
      timeout: 10s
      retries: 10

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.0
    volumes:
      - ./logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    ports:
      - "5000:5000"
    depends_on:
      elasticsearch:
        condition: service_healthy

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

  apm-server:
    image: docker.elastic.co/apm/apm-server:8.15.0
    ports:
      - "8200:8200"
    environment:
      - output.elasticsearch.hosts=["elasticsearch:9200"]
      - apm-server.host=0.0.0.0:8200
    depends_on:
      elasticsearch:
        condition: service_healthy

  # ============================================
  # Microservices
  # ============================================
  identity-service:
    build: ./identity-service
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/simplestore
      SPRING_DATASOURCE_USERNAME: simplestore
      SPRING_DATASOURCE_PASSWORD: simplestore
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: simplestore
      SPRING_RABBITMQ_PASSWORD: simplestore
      SPRING_REDIS_HOST: redis
      JWT_SECRET: c2ltcGxlLXN0b3JlLXNlY3JldC1rZXktZm9yLWp3dC10b2tlbnMtc2hhcmVkLWFjcm9zcy1zZXJ2aWNlcw==
      ELASTIC_APM_SERVICE_NAME: identity-service
      ELASTIC_APM_SERVER_URL: http://apm-server:8200
      ELASTIC_APM_APPLICATION_PACKAGES: com.simplestore
      LOGSTASH_HOST: logstash
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  catalog-service:
    build: ./catalog-service
    ports:
      - "8082:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/simplestore
      SPRING_DATASOURCE_USERNAME: simplestore
      SPRING_DATASOURCE_PASSWORD: simplestore
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: simplestore
      SPRING_RABBITMQ_PASSWORD: simplestore
      JWT_SECRET: c2ltcGxlLXN0b3JlLXNlY3JldC1rZXktZm9yLWp3dC10b2tlbnMtc2hhcmVkLWFjcm9zcy1zZXJ2aWNlcw==
      ELASTIC_APM_SERVICE_NAME: catalog-service
      ELASTIC_APM_SERVER_URL: http://apm-server:8200
      ELASTIC_APM_APPLICATION_PACKAGES: com.simplestore
      LOGSTASH_HOST: logstash
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  cart-service:
    build: ./cart-service
    ports:
      - "8083:8080"
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: simplestore
      SPRING_RABBITMQ_PASSWORD: simplestore
      JWT_SECRET: c2ltcGxlLXN0b3JlLXNlY3JldC1rZXktZm9yLWp3dC10b2tlbnMtc2hhcmVkLWFjcm9zcy1zZXJ2aWNlcw==
      ELASTIC_APM_SERVICE_NAME: cart-service
      ELASTIC_APM_SERVER_URL: http://apm-server:8200
      ELASTIC_APM_APPLICATION_PACKAGES: com.simplestore
      LOGSTASH_HOST: logstash
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  order-service:
