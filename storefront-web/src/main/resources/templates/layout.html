<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ? ${pageTitle} + ' - SimpleStore' : 'SimpleStore'">SimpleStore</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header class="site-header">
        <div class="container header-container">
            <a th:href="@{/}" class="logo">
                <h1>SimpleStore</h1>
            </a>
            <nav class="main-nav">
                <ul class="nav-links">
                    <li><a th:href="@{/products}" class="nav-link">Products</a></li>
                    <li>
                        <a th:href="@{/cart}" class="nav-link cart-link">
                            Cart
                            <span class="cart-badge" id="cart-badge" th:text="${cartItemCount} ? ${cartItemCount} : '0'" th:if="${cartItemCount != null && cartItemCount > 0}">0</span>
                        </a>
                    </li>
                    <li class="account-dropdown" th:if="${authenticated}">
                        <a href="#" class="nav-link dropdown-toggle">Account ▾</a>
                        <ul class="dropdown-menu">
                            <li><a th:href="@{/account/orders}">My Orders</a></li>
                            <li><a th:href="@{/account/logout}">Logout</a></li>
                        </ul>
                    </li>
                    <li class="account-dropdown" th:unless="${authenticated}">
                        <a href="#" class="nav-link dropdown-toggle">Account ▾</a>
                        <ul class="dropdown-menu">
                            <li><a th:href="@{/account/login}">Login</a></li>
                            <li><a th:href="@{/account/register}">Register</a></li>
                        </ul>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="container" layout:fragment="content">
            <!-- Page content goes here -->
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; <span th:text="${#calendars.format(#calendars.createNow(), 'yyyy')}">2024</span> SimpleStore. All rights reserved.</p>
        </div>
    </footer>

    <script th:src="@{/js/cart.js}"></script>
</body>
</html>
