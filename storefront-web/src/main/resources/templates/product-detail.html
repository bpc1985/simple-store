<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title th:text="${product.name} + ' - SimpleStore'">Product Detail</title>
</head>
<body>
    <div layout:fragment="content">
        <a th:href="@{/products}" class="back-link">&larr; Back to Products</a>

        <div class="product-detail" th:if="${product != null}">
            <div class="product-detail-image">
                <img th:src="${product.imageUrl} ?: @{/images/placeholder.png}" th:alt="${product.name}" class="product-detail-img">
            </div>
            <div class="product-detail-info">
                <h2 class="product-detail-name" th:text="${product.name}">Product Name</h2>
                <p class="product-detail-price" th:text="'$' + ${#numbers.formatDecimal(product.price, 1, 2)}">$0.00</p>

                <div class="product-stock" th:if="${product.stockQuantity != null}">
                    <span th:if="${product.stockQuantity > 0}" class="stock-status in-stock">
                        In Stock (<span th:text="${product.stockQuantity}">10</span> available)
                    </span>
                    <span th:if="${product.stockQuantity <= 0}" class="stock-status out-of-stock">Out of Stock</span>
                </div>

                <div class="product-description">
                    <h3>Description</h3>
                    <p th:text="${product.description} ?: 'No description available.'">Product description goes here.</p>
                </div>

                <form th:if="${product.stockQuantity > 0}" th:action="@{/cart/add/{id}(id=${product.id})}" method="post" class="add-to-cart-form">
                    <div class="quantity-control">
                        <label for="quantity">Quantity:</label>
                        <input type="number" id="quantity" name="quantity" value="1" min="1"
                               th:max="${product.stockQuantity}" class="quantity-input">
                    </div>
                    <button type="submit" class="btn btn-success btn-lg add-to-cart-btn"
                            th:attr="data-product-id=${product.id}">
                        Add to Cart
                    </button>
                </form>
            </div>
        </div>

        <div th:unless="${product != null}" class="empty-state">
            <h3>Product Not Found</h3>
            <p>The product you are looking for does not exist or has been removed.</p>
            <a th:href="@{/products}" class="btn btn-primary">Browse Products</a>
        </div>
    </div>
</body>
</html>
