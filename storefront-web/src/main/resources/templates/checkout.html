<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Checkout - SimpleStore</title>
</head>
<body>
    <div layout:fragment="content">
        <h2 class="page-title">Checkout</h2>

        <div th:if="${cart == null or cart.items == null or cart.items.isEmpty()}" class="empty-state">
            <h3>Your cart is empty</h3>
            <p>You cannot proceed to checkout with an empty cart.</p>
            <a th:href="@{/products}" class="btn btn-primary">Browse Products</a>
        </div>

        <div th:if="${cart != null and cart.items != null and !cart.items.isEmpty()}" class="checkout-layout">
            <!-- Order Summary -->
            <div class="checkout-summary">
                <h3>Order Summary</h3>
                <table class="checkout-table">
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Quantity</th>
                            <th>Price</th>
                            <th>Subtotal</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${cart.items}">
                            <td th:text="${item.productName}">Product Name</td>
                            <td th:text="${item.quantity}">1</td>
                            <td th:text="'$' + ${#numbers.formatDecimal(item.price, 1, 2)}">$0.00</td>
                            <td th:text="'$' + ${#numbers.formatDecimal(item.subtotal, 1, 2)}">$0.00</td>
                        </tr>
                    </tbody>
                </table>

                <div class="checkout-total">
                    <strong>Total:</strong>
                    <span th:text="'$' + ${#numbers.formatDecimal(cart.totalPrice, 1, 2)}">$0.00</span>
                </div>
            </div>

            <!-- Shipping Address Form -->
            <div class="shipping-form-container">
                <h3>Shipping Address</h3>
                <form th:action="@{/checkout}" method="post" class="checkout-form">
                    <div class="form-group">
                        <label for="shippingAddress">Address</label>
                        <textarea id="shippingAddress" name="shippingAddress" class="form-input form-textarea"
                                  placeholder="Enter your full shipping address" rows="4" required></textarea>
                    </div>

                    <button type="submit" class="btn btn-success btn-lg btn-block">Place Order</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
