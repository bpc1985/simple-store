<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Register - SimpleStore</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="auth-container">
            <h2 class="page-title">Create an Account</h2>

            <div th:if="${error}" class="alert alert-error">
                <p th:text="${error}">An error occurred during registration.</p>
            </div>

            <form th:action="@{/account/register}" method="post" class="auth-form" th:object="${registrationForm}">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" th:field="*{fullName}" class="form-input"
                           placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" th:field="*{email}" class="form-input"
                           placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" th:field="*{password}" class="form-input"
                           placeholder="Enter a password" required minlength="6">
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" class="form-input"
                           placeholder="Confirm your password" required>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Register</button>
            </form>

            <p class="auth-alt-link">
                Already have an account? <a th:href="@{/account/login}">Login here</a>.
            </p>
        </div>
    </div>
</body>
</html>
