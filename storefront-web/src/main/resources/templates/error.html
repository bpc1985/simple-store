<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title th:text="${status != null ? 'Error ' + status : 'Error'} + ' - SimpleStore'">Error - SimpleStore</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="error-container">
            <div class="error-content">
                <h1 class="error-code" th:text="${status} ?: 'Error'">Error</h1>
                <h2 class="error-message" th:text="${error} ?: 'Something went wrong'">Something went wrong</h2>
                <p class="error-description" th:if="${message != null}" th:text="${message}">
                    We encountered an unexpected issue. Please try again later.
                </p>
                <p class="error-description" th:unless="${message != null}">
                    The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
                </p>
                <div class="error-actions">
                    <a th:href="@{/}" class="btn btn-primary btn-lg">Go Home</a>
                    <a href="javascript:history.back()" class="btn btn-outline">Go Back</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
