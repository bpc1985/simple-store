<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Login - SimpleStore</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="auth-container">
            <h2 class="page-title">Login</h2>

            <div th:if="${param.error}" class="alert alert-error">
                <p th:text="${param.error[0] == 'true'} ? 'Invalid email or password. Please try again.' : 'An error occurred. Please try again.'">
                    Invalid email or password.
                </p>
            </div>

            <div th:if="${param.logout}" class="alert alert-success">
                <p>You have been logged out successfully.</p>
            </div>

            <form th:action="@{/account/login}" method="post" class="auth-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" class="form-input" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Login</button>
            </form>

            <p class="auth-alt-link">
                Don't have an account? <a th:href="@{/account/register}">Register here</a>.
            </p>
        </div>
    </div>
</body>
</html>
