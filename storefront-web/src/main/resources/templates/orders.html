<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>My Orders - SimpleStore</title>
</head>
<body>
    <div layout:fragment="content">
        <h2 class="page-title">My Orders</h2>

        <div th:if="${orders != null and !orders.isEmpty()}">
            <table class="orders-table">
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Date</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="order : ${orders}">
                        <td th:text="${order.id}">#12345</td>
                        <td th:text="${#temporals.format(order.orderDate, 'MMM dd, yyyy')}">Jan 01, 2024</td>
                        <td th:text="'$' + ${#numbers.formatDecimal(order.totalAmount, 1, 2)}">$0.00</td>
                        <td>
                            <span class="order-status" th:text="${order.status}">Status</span>
                        </td>
                        <td>
                            <a th:href="@{/account/orders/{id}(id=${order.id})}" class="btn btn-sm btn-outline">View</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div th:unless="${orders != null and !orders.isEmpty()}" class="empty-state">
            <h3>No Orders Yet</h3>
            <p>You haven't placed any orders yet. Start shopping!</p>
            <a th:href="@{/products}" class="btn btn-primary">Browse Products</a>
        </div>
    </div>
</body>
</html>
